name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run type checking
        run: npm run typecheck

  migrations:
    name: Migration Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for migration drift
        run: |
          set -euo pipefail

          BASE="origin/${{ github.event.pull_request.base.ref }}"
          git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=1

          if git diff --name-only "$BASE"...HEAD -- app/lib/db/schema.ts | grep -q .; then
            if ! git diff --name-only "$BASE"...HEAD -- drizzle/ | grep -q .; then
              echo "::error::app/lib/db/schema.ts changed in this PR but no drizzle/ migration files were updated. Run 'npm run db:generate' locally and commit the migration."
              exit 1
            fi
          fi

          set +e
          npm run db:generate 2>&1 | tee /tmp/drizzle-generate.log
          GENERATE_EXIT=${PIPESTATUS[0]}
          set -e

          if grep -q "Interactive prompts require a TTY" /tmp/drizzle-generate.log; then
            echo "::error::drizzle-kit generate requires interactive input (likely a column/table rename). Run 'npm run db:generate' locally, commit the migration, and re-push."
            exit 1
          fi

          if [ "$GENERATE_EXIT" -ne 0 ]; then
            echo "::error::drizzle-kit generate failed with exit code $GENERATE_EXIT"
            cat /tmp/drizzle-generate.log
            exit 1
          fi

          if [ -n "$(git status --porcelain drizzle/)" ]; then
            echo "::error::Schema drift detected! Run 'npm run db:generate' and commit the migration."
            git status drizzle/
            git diff drizzle/ || true
            exit 1
          fi
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db

      - name: Test migrations apply cleanly
        run: npm run db:migrate
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db

      - name: Verify committed migrations match schema
        run: |
          set -euo pipefail

          set +e
          npm run db:generate 2>&1 | tee /tmp/drizzle-post-migrate.log
          GENERATE_EXIT=${PIPESTATUS[0]}
          set -e

          if grep -q "Interactive prompts require a TTY" /tmp/drizzle-post-migrate.log; then
            echo "::error::Committed migrations are incomplete for schema.ts (interactive generate still required)."
            exit 1
          fi

          if [ "$GENERATE_EXIT" -ne 0 ]; then
            echo "::error::drizzle-kit generate failed after migrate with exit code $GENERATE_EXIT"
            cat /tmp/drizzle-post-migrate.log
            exit 1
          fi

          if [ -n "$(git status --porcelain drizzle/)" ]; then
            echo "::error::After applying migrations, schema.ts still differs from committed migration snapshots."
            git status drizzle/
            git diff drizzle/ || true
            exit 1
          fi
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db

  tests:
    name: Tests (Vitest + Postgres)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations to test database
        run: npm run db:migrate
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db

      - name: Run tests (unit + integration)
        run: npm run test:ci
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
